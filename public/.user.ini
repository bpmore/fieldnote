; Per-directory PHP-FPM overrides so image uploads up to the app's 10 MB cap
; actually make it through PHP. post_max_size leaves headroom for the rest of
; the form body. Picked up automatically by PHP-FPM (user_ini.cache_ttl,
; default 300s). Apache/mod_php users: set these in a vhost or php.ini.
upload_max_filesize = 12M
post_max_size = 16M
