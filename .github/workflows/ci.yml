name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, curl, mbstring, zip

      - run: composer install --no-interaction --no-progress

      # Theme contract: 8 tokens, WCAG 2.2 AA contrast in both schemes,
      # skip links, focus visibility, exactly one h1 — all 70 themes.
      - run: php bin/audit-themes.php

      # Route matrix against a disposable instance: rendering, draft and
      # protected-body leaks, auth gating, CSRF, traversal, feed 304s,
      # theme previews.
      - run: php bin/smoke-test.php
